<aside class="flex flex-col h-screen bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 transition-all duration-300"
       [class.w-64]="!collapsed()"
       [class.w-16]="collapsed()">

  <!-- Logo -->
  <div class="flex items-center border-b border-slate-100 dark:border-slate-800 py-5 transition-all duration-300"
       [class.px-4]="!collapsed()"
       [class.justify-center]="collapsed()">
    @if (!collapsed()) {
      <div class="w-8 h-8 rounded-lg bg-teal-500 flex items-center justify-center flex-shrink-0">
        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
      </div>
      <span class="text-lg font-bold text-slate-900 dark:text-white tracking-tight ml-3">FiTrack</span>
    }
    <button (click)="toggle()" 
            [class.ml-auto]="!collapsed()"
            class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition focus:outline-none p-1 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
  </div>

  <!-- Nav links -->
  <nav class="flex-1 py-4 px-2 space-y-1 overflow-y-auto">
    @for (item of navItems; track item.path) {
      <a [routerLink]="item.path"
         routerLinkActive="bg-teal-50 dark:bg-teal-950/40 text-teal-600 dark:text-teal-400 font-semibold"
         [routerLinkActiveOptions]="{exact: item.path === '/dashboard'}"
         class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 hover:text-slate-900 dark:hover:text-white transition-all duration-150 group"
         [title]="collapsed() ? item.label : ''">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="item.icon"/>
        </svg>
        @if (!collapsed()) {
          <span>{{ item.label }}</span>
        }
      </a>
    }
  </nav>

  <!-- Logout -->
  <div class="border-t border-slate-100 dark:border-slate-800 p-2">
    <button (click)="logout()"
            class="flex items-center gap-3 w-full px-3 py-2.5 rounded-xl text-sm text-slate-600 dark:text-slate-400 hover:bg-rose-50 dark:hover:bg-rose-950/30 hover:text-rose-600 dark:hover:text-rose-400 transition-all duration-150"
            [title]="collapsed() ? 'Sign Out' : ''">
      <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
      </svg>
      @if (!collapsed()) {
        <span>Sign Out</span>
      }
    </button>
  </div>
</aside>
