<div class="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-900 px-4 py-12 sm:px-6 lg:px-8 transition-colors duration-300">
  <div class="max-w-lg w-full space-y-8 bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-slate-700/50">
    
    <div class="text-center">
      <h2 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight">
        Create Your Profile
      </h2>
      <p class="mt-2 text-sm text-slate-500 dark:text-slate-400">
        Initialize your unified ledger system infrastructure
      </p>
    </div>

    <div *ngIf="errorMessage" class="p-4 bg-rose-50 dark:bg-rose-950/30 border border-rose-200 dark:border-rose-800/50 rounded-xl">
      <p class="text-sm text-rose-600 dark:text-rose-400 font-medium">
        {{ errorMessage }}
      </p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="mt-8 space-y-5">
      <div class="grid grid-cols-1 gap-5 sm:grid-cols-2">
        
        <div class="sm:col-span-2">
          <label for="reg_email" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">
            Email Address
          </label>
          <input 
            id="reg_email" 
            type="email" 
            formControlName="email" 
            class="block w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent text-sm" 
            placeholder="name@example.com" 
          />
          <div *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.invalid" class="mt-1.5 text-xs text-rose-500 font-medium">
            Please provide a valid structural email declaration.
          </div>
        </div>

        <div class="sm:col-span-2">
          <label for="reg_password" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">
            Security Password
          </label>
          <input 
            id="reg_password" 
            type="password" 
            formControlName="password" 
            class="block w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent text-sm" 
            placeholder="Minimum 8 characters" 
          />
          <div *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.invalid" class="mt-1.5 text-xs text-rose-500 font-medium">
            Password must encompass 8 characters or more.
          </div>
        </div>

        <div>
          <label for="reg_currency" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">
            Currency Baseline
          </label>
          <select 
            id="reg_currency" 
            formControlName="base_currency" 
            class="block w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent text-sm cursor-pointer"
          >
            <option *ngFor="let curr of currencies" [value]="curr">{{ curr }}</option>
          </select>
        </div>

        <div>
          <label for="reg_timezone" class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">
            Operating Timezone
          </label>
          <select 
            id="reg_timezone" 
            formControlName="timezone" 
            class="block w-full px-4 py-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-brand focus:border-transparent text-sm cursor-pointer"
          >
            <option *ngFor="let zone of timezones" [value]="zone">{{ zone }}</option>
          </select>
        </div>

      </div>

      <div class="pt-2">
        <button 
          type="submit" 
          [disabled]="registerForm.invalid || isSubmitting" 
          class="w-full flex justify-center py-3 px-4 border border-transparent text-sm font-semibold rounded-xl text-white bg-brand hover:bg-brand-light focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand disabled:opacity-50 transition duration-200"
        >
          {{ isSubmitting ? 'Provisioning Identity...' : 'Register Secure Profile' }}
        </button>
      </div>
    </form>

    <div class="text-center mt-4">
      <p class="text-sm text-slate-500 dark:text-slate-400">
        Already registered? 
        <a routerLink="/login" class="font-medium text-brand hover:text-brand-light transition duration-150">
          Return to identity validation
        </a>
      </p>
    </div>

  </div>
</div>
